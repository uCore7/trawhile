spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/trawhile}
    username: ${SPRING_DATASOURCE_USERNAME:tt}
    password: ${SPRING_DATASOURCE_PASSWORD:dev}

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    session:
      timeout: 0  # no session timeout

management:
  server:
    port: ${MANAGEMENT_PORT:9090}  # SR-F059.F01: management port; not routed through Caddy
  endpoints:
    web:
      exposure:
        include: prometheus,health
  metrics:
    export:
      prometheus:
        enabled: true

# System configuration (SR-F050.F05). Override in config/application.yml mounted next to docker-compose.yml.
# Secrets (DB credentials, OAuth client secrets, bootstrap admin email) stay in environment variables.
trawhile:
  name: "trawhile"
  timezone: "UTC"
  freeze-offset-years: 2        # entries older than this many years become immutable; must be <= retention-years
  retention-years: 5            # activity purge cutoff in years; minimum 2
  node-retention-extra-years: 1 # additional years before deactivated nodes are deleted; minimum 0
  privacy-notice-url: ""        # optional HTTPS URL; leave blank if none
  oidc:
    google:
      client-id: ${GOOGLE_CLIENT_ID:${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:}}
      client-secret: ${GOOGLE_CLIENT_SECRET:${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:}}
    apple:
      # Apple uses OIDC with a JWT client secret (generated from a private key).
      # client-id: Apple Services ID (e.g. com.example.trawhile)
      # client-secret: a short-lived JWT signed with the Apple private key.
      client-id: ${APPLE_CLIENT_ID:${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_APPLE_CLIENT_ID:}}
      client-secret: ${APPLE_CLIENT_SECRET:${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_APPLE_CLIENT_SECRET:}}
    microsoft:
      # Microsoft Entra ID (Azure AD). Set MICROSOFT_TENANT_ID to your directory tenant ID.
      # Use 'common' only for multi-tenant apps; for a single company always use the tenant ID.
      client-id: ${MICROSOFT_CLIENT_ID:${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_MICROSOFT_CLIENT_ID:}}
      client-secret: ${MICROSOFT_CLIENT_SECRET:${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_MICROSOFT_CLIENT_SECRET:}}
      tenant-id: ${MICROSOFT_TENANT_ID:common}
    keycloak:
      # Keycloak OIDC. Set KEYCLOAK_ISSUER_URI to your realm URL,
      # e.g. https://keycloak.example.com/realms/company
      client-id: ${KEYCLOAK_CLIENT_ID:${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_ID:}}
      client-secret: ${KEYCLOAK_CLIENT_SECRET:${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET:}}
      issuer-uri: ${KEYCLOAK_ISSUER_URI:}

logging:
  level:
    com.trawhile: INFO
