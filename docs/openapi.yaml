openapi: 3.1.0

info:
  title: Trawhile API
  version: 0.1.0
  description: |
    REST API for the self-hosted time tracking application.
    One instance = one company.

    **Authentication**: Spring Security session cookie (`JSESSIONID`, HttpOnly, SameSite=Strict).
    All endpoints require an authenticated session unless `security: []` is noted.
    OIDC login flows (Google, Apple, Microsoft Entra ID, Keycloak) are handled by Spring Security at
    `/oauth2/authorization/{provider}` and `/login/oauth2/code/{provider}` — not documented here.

    **Authorization**: Recursive. A grant on node N is effective on N and all descendants.
    Levels: `view` ⊂ `track` ⊂ `admin`. Only Node Admins (effective `admin`) may grant or
    revoke authorizations.

    **Errors**: All error responses use `{ code, message }`. Rate-limited requests return 429.

    **SSE**: Live state is pushed via `GET /api/v1/events`. See that endpoint for event types.

servers:
  - url: /api/v1

security:
  - sessionCookie: []

tags:
  - name: auth
  - name: settings
  - name: users
  - name: invitations
  - name: nodes
  - name: authorizations
  - name: requests
  - name: tracking
  - name: time-entries
  - name: quick-access
  - name: reports
  - name: account
  - name: mcp
    description: MCP access token management
  - name: security-events
    description: System Admin only
  - name: about
  - name: events
    description: SSE live sync

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: JSESSIONID

  schemas:

    Problem:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: LAST_ADMIN
        message:
          type: string
          example: Cannot revoke the last admin authorization on this node

    AuthLevel:
      type: string
      enum: [view, track, admin]

    NodePathEntry:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    NodeSummary:
      type: object
      required: [id, name, isActive, sortOrder, hasActiveChildren]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: [string, 'null']
        isActive:
          type: boolean
        sortOrder:
          type: integer
        hasActiveChildren:
          type: boolean
        effectiveAuthorization:
          oneOf:
            - $ref: '#/components/schemas/AuthLevel'
            - type: 'null'
          description: Null if user has no grant on this node or any ancestor
        color:
          type: [string, 'null']
          description: CSS hex color e.g. '#4A90D9'
        icon:
          type: [string, 'null']
          description: PrimeIcons identifier e.g. 'pi-briefcase'
        logoUrl:
          type: [string, 'null']
          description: URL to GET /nodes/{nodeId}/logo; null if no logo uploaded

    Node:
      type: object
      required: [id, name, isActive, sortOrder, createdAt, ancestorPath, children]
      properties:
        id:
          type: string
          format: uuid
        parentId:
          type: [string, 'null']
          format: uuid
        name:
          type: string
        description:
          type: [string, 'null']
        isActive:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        deactivatedAt:
          type: [string, 'null']
          format: date-time
        effectiveAuthorization:
          oneOf:
            - $ref: '#/components/schemas/AuthLevel'
            - type: 'null'
        color:
          type: [string, 'null']
          description: CSS hex color e.g. '#4A90D9'
        icon:
          type: [string, 'null']
          description: PrimeIcons identifier e.g. 'pi-briefcase'
        logoUrl:
          type: [string, 'null']
          description: URL to GET /nodes/{nodeId}/logo; null if no logo uploaded
        ancestorPath:
          type: array
          description: |
            Path entries from root to parent (inclusive). Included for navigation context even
            if the user cannot see some ancestors. Those are rendered as non-interactive crumbs.
          items:
            $ref: '#/components/schemas/NodePathEntry'
        children:
          type: array
          description: Direct children visible to the requesting user
          items:
            $ref: '#/components/schemas/NodeSummary'

    NodeAuthorization:
      type: object
      required: [userId, userName, authorization, inherited]
      properties:
        userId:
          type: string
          format: uuid
        userName:
          type: string
          description: Fixed placeholder string if user is anonymised
        authorization:
          $ref: '#/components/schemas/AuthLevel'
        inherited:
          type: boolean
          description: True if the grant originates on an ancestor node, not this node directly
        inheritedFromNodeId:
          type: [string, 'null']
          format: uuid
          description: The ancestor node where the grant originates; null if direct

    UserSummary:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: [string, 'null']
          description: Profile name if active; invitation email if pending; fixed placeholder if anonymised
        status:
          type: string
          enum: [pending, active, anonymised]

    PendingInvitation:
      type: object
      required: [id, userId, email, invitedBy, invitedAt, expiresAt]
      properties:
        id:
          type: string
          format: uuid
          description: Pending invitation record ID
        userId:
          type: string
          format: uuid
          description: The invitee's user record ID; use this to grant node authorizations before first login
        email:
          type: string
          format: email
        invitedBy:
          $ref: '#/components/schemas/UserSummary'
        invitedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          description: Invitation automatically expires at this time (90 days after creation)

    SystemSettings:
      type: object
      required: [name, timezone, freezeOffsetYears, effectiveFreezeCutoff, retentionYears, nodeRetentionExtraYears]
      properties:
        name:
          type: string
          description: Instance name displayed in the UI
        timezone:
          type: string
          description: IANA timezone identifier; reference for date boundaries in reports and purge cutoff evaluation
          example: Europe/Zurich
        freezeOffsetYears:
          type: integer
          minimum: 0
          description: Entries older than this many years are immutable (cannot be edited or deleted)
        effectiveFreezeCutoff:
          type: string
          format: date-time
          description: Computed as NOW() minus freezeOffsetYears; returned for display convenience
        retentionYears:
          type: integer
          minimum: 2
          description: Activity entries and requests older than this are permanently deleted on the next purge
        nodeRetentionExtraYears:
          type: integer
          minimum: 0
          description: Deactivated nodes are kept for this many additional years beyond retentionYears before deletion
        privacyNoticeUrl:
          type: [string, 'null']
          description: HTTPS URL to the company Privacy Notice; shown to authenticated users with at least one effective node authorization

    TimeEntry:
      type: object
      required: [id, userId, nodeId, nodePath, startedAt, timezone, createdAt, overlapping, hasGapBefore]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        nodeId:
          type: string
          format: uuid
        nodePath:
          type: array
          items:
            $ref: '#/components/schemas/NodePathEntry'
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: [string, 'null']
          format: date-time
          description: Null if this is the currently active entry
        timezone:
          type: string
          description: IANA timezone captured from browser at tracking start
        description:
          type: [string, 'null']
          description: Optional short note written by the member
        createdAt:
          type: string
          format: date-time
        overlapping:
          type: boolean
        hasGapBefore:
          type: boolean
          description: True if there is untracked time between the previous entry's endedAt and this entry's startedAt

    TrackingStatus:
      type: object
      required: [active]
      properties:
        active:
          type: boolean
        entryId:
          type: [string, 'null']
          format: uuid
        nodeId:
          type: [string, 'null']
          format: uuid
        nodePath:
          type: [array, 'null']
          items:
            $ref: '#/components/schemas/NodePathEntry'
        startedAt:
          type: [string, 'null']
          format: date-time
        timezone:
          type: [string, 'null']
        elapsedSeconds:
          type: [integer, 'null']
          description: Computed server-side as NOW() - startedAt in seconds

    QuickAccessEntry:
      type: object
      required: [nodeId, nodePath, sortOrder, nonTrackable]
      properties:
        nodeId:
          type: string
          format: uuid
        nodePath:
          type: array
          items:
            $ref: '#/components/schemas/NodePathEntry'
        sortOrder:
          type: integer
        nonTrackable:
          type: boolean
          description: True if node is deactivated or has active children
        color:
          type: [string, 'null']
          description: Company-wide color set by Node Admin (CSS hex e.g. '#4A90D9')
        icon:
          type: [string, 'null']
          description: PrimeIcons identifier e.g. 'pi-briefcase'
        logoUrl:
          type: [string, 'null']
          description: URL to GET /nodes/{nodeId}/logo; null if no logo uploaded

    ReportSummaryEntry:
      type: object
      required: [nodeId, nodePath, totalSeconds]
      properties:
        nodeId:
          type: string
          format: uuid
        nodePath:
          type: array
          items:
            $ref: '#/components/schemas/NodePathEntry'
        totalSeconds:
          type: integer

    ReportDetailEntry:
      type: object
      required: [id, userId, userName, nodeId, nodePath, startedAt, timezone, overlapping, hasGapBefore]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        userName:
          type: [string, 'null']
          description: Null if user is anonymised
        nodeId:
          type: string
          format: uuid
        nodePath:
          type: array
          items:
            $ref: '#/components/schemas/NodePathEntry'
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: [string, 'null']
          format: date-time
        timezone:
          type: string
        description:
          type: [string, 'null']
          description: Optional short note written by the member
        overlapping:
          type: boolean
        hasGapBefore:
          type: boolean
          description: True if there is untracked time between the previous entry's endedAt and this entry's startedAt

    Report:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [summary, detailed]
        summary:
          type: [array, 'null']
          items:
            $ref: '#/components/schemas/ReportSummaryEntry'
        detailed:
          type: [array, 'null']
          items:
            $ref: '#/components/schemas/ReportDetailEntry'

    MemberSummaryBucket:
      type: object
      required: [periodStart, periodEnd, totalSeconds, hasDataQualityIssues]
      properties:
        periodStart:
          type: string
          format: date
          description: Inclusive start of the period in company timezone
        periodEnd:
          type: string
          format: date
          description: Inclusive end of the period in company timezone
        totalSeconds:
          type: integer
        hasDataQualityIssues:
          type: boolean
          description: True if the member's entries for this period contain overlaps or gaps

    MemberSummary:
      type: object
      required: [userId, userName, buckets]
      properties:
        userId:
          type: string
          format: uuid
        userName:
          type: [string, 'null']
          description: Null if user is anonymised
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/MemberSummaryBucket'

    RequestRecord:
      type: object
      required: [id, requesterId, requesterName, nodeId, template, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        requesterId:
          type: string
          format: uuid
        requesterName:
          type: [string, 'null']
        nodeId:
          type: string
          format: uuid
        template:
          type: string
          enum: [grant_authorization, create_child_node, free_text]
        body:
          type: [string, 'null']
        status:
          type: string
          enum: [open, closed]
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: [string, 'null']
          format: date-time
        resolvedBy:
          type: [string, 'null']
          format: uuid
        resolvedByName:
          type: [string, 'null']

    UserAuthorization:
      type: object
      required: [nodeId, nodePath, authorization]
      properties:
        nodeId:
          type: string
          format: uuid
        nodePath:
          type: array
          items:
            $ref: '#/components/schemas/NodePathEntry'
        authorization:
          $ref: '#/components/schemas/AuthLevel'

    SecurityEvent:
      type: object
      required: [id, eventType, occurredAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: [string, 'null']
          format: uuid
        userName:
          type: [string, 'null']
        eventType:
          type: string
          enum:
            - OAUTH_LOGIN_SUCCESS
            - OAUTH_LOGIN_FAILED
            - NODE_ADMIN_GRANTED
            - NODE_ADMIN_REVOKED
            - ACCOUNT_ANONYMISED
            - USER_REMOVED
            - RATE_LIMIT_BREACH
            - AUTHORIZATION_FAILURE
            - ACTIVITY_PURGE_COMPLETED
            - NODE_DELETION_COMPLETED
            - MCP_TOKEN_GENERATED
            - MCP_TOKEN_USED
            - MCP_TOKEN_REVOKED
        details:
          type: [object, 'null']
          additionalProperties: true
        ipAddress:
          type: [string, 'null']
        occurredAt:
          type: string
          format: date-time

    McpToken:
      type: object
      required: [id, label, createdAt]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: [string, 'null']
          format: date-time
        expiresAt:
          type: [string, 'null']
          format: date-time
          description: Null means the token does not expire

    McpTokenWithOwner:
      type: object
      required: [id, userId, userName, label, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        userName:
          type: [string, 'null']
        label:
          type: string
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: [string, 'null']
          format: date-time
        expiresAt:
          type: [string, 'null']
          format: date-time

    AboutInfo:
      type: object
      required: [version, licenses, sbomUrl, openApiUrl, gdprSummary]
      properties:
        version:
          type: string
        licenses:
          type: array
          items:
            type: object
            required: [component, license]
            properties:
              component:
                type: string
              license:
                type: string
        sbomUrl:
          type: string
          description: URL to download the CycloneDX SBOM
        openApiUrl:
          type: string
          description: URL to download the OpenAPI specification
        gdprSummary:
          type: object
          required: [storedData, retentionPeriod, rightToErasure]
          description: Built-in summary of personal data handling, always public, translated by Accept-Language
          properties:
            storedData:
              type: string
              description: Human-readable description of what personal data is stored
            retentionPeriod:
              type: string
              description: Human-readable description of how long data is retained
            rightToErasure:
              type: string
              description: Human-readable description of how to exercise the right to erasure
        privacyNoticeUrl:
          type: [string, 'null']
          description: Company Privacy Notice URL; included only for authenticated users with at least one effective node authorization

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Authenticated but not authorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Business rule violation (e.g. last admin, frozen entry, full quick-access)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnprocessableEntity:
      description: Validation error (e.g. startedAt >= endedAt, invalid timezone)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'

paths:

  # ---------------------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------------------

  /auth/providers:
    get:
      tags: [auth]
      summary: List configured OIDC providers
      operationId: getProviders
      security: []
      description: |
        Returns the registration IDs of all OIDC providers that have a non-empty client-id
        configured at startup. Used by the login page to render only the active sign-in buttons.
        Accessible without authentication. SR-085.
      responses:
        '200':
          description: Active providers
          content:
            application/json:
              schema:
                type: object
                required: [providers]
                properties:
                  providers:
                    type: array
                    items:
                      type: string
                      enum: [google, apple, microsoft, keycloak]
                    example: [google, microsoft]

  /auth/logout:
    post:
      tags: [auth]
      summary: Log out
      operationId: logout
      description: Invalidates the current Spring Security session.
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/gdpr-notice:
    post:
      tags: [auth]
      summary: Acknowledge GDPR notice and complete registration
      operationId: acknowledgeGdprNotice
      description: |
        Called after the user reads the GDPR notice on first login. Reads pending registration
        data from the HTTP session (stored during OAuth2 callback per SR-008) and executes the
        account creation transaction: inserts user_profile, user_oauth_providers, deletes
        pending_invitations. Establishes an authenticated session. Returns privacy_notice_url if
        configured. Returns 400 if no pending registration data is in the session. SR-057a.
      responses:
        '200':
          description: Registration complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  privacyNoticeUrl:
                    type: [string, 'null']
                    format: uri
        '400':
          description: No pending registration data in session
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---------------------------------------------------------------------------
  # System settings (read-only; config is set via application.yml at deployment)
  # ---------------------------------------------------------------------------

  /settings:
    get:
      tags: [settings]
      summary: Get system settings
      operationId: getSettings
      description: |
        Returns the resolved system configuration to any authenticated user. Values are read from
        the config file at startup and cannot be changed via the API. SR-012.
      responses:
        '200':
          description: System settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSettings'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---------------------------------------------------------------------------
  # Users
  # ---------------------------------------------------------------------------

  /users:
    get:
      tags: [users]
      summary: List all users
      operationId: listUsers
      description: Requires System Admin. SR-005.
      responses:
        '200':
          description: All users (pending, active, and anonymised)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{userId}:
    delete:
      tags: [users]
      summary: Remove user
      operationId: removeUser
      description: |
        Requires System Admin. In one transaction: stops active tracking, revokes active MCP
        tokens, deletes all node authorizations, deletes user_profile (cascades to oauth
        providers, quick_access). If the user has time entries, retains the users row as an
        anonymous stub; otherwise deletes it. SR-010.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: User removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/authorizations:
    get:
      tags: [users]
      summary: List user's node authorizations
      operationId: getUserAuthorizations
      description: Requires System Admin. SR-011.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Authorization assignments with full node paths
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserAuthorization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # Invitations
  # ---------------------------------------------------------------------------

  /invitations:
    get:
      tags: [invitations]
      summary: List pending invitations
      operationId: listInvitations
      description: Requires System Admin. SR-006.
      responses:
        '200':
          description: Pending memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PendingInvitation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [invitations]
      summary: Invite user by email
      operationId: createInvitation
      description: |
        Requires System Admin. Creates users row and pending_invitations row. Rejects if email already in pending_invitations or
        already linked to an existing user. SR-007.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                type: object
                required: [mailtoLink, invitation]
                properties:
                  mailtoLink:
                    type: string
                    description: "Pre-filled mailto: URI for the admin to send to the invitee"
                  invitation:
                    $ref: '#/components/schemas/PendingInvitation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /invitations/{invitationId}:
    delete:
      tags: [invitations]
      summary: Withdraw invitation
      operationId: withdrawInvitation
      description: Requires System Admin. SR-009.
      parameters:
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Withdrawn
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /invitations/{invitationId}/resend:
    post:
      tags: [invitations]
      summary: Resend invitation
      operationId: resendInvitation
      description: |
        Requires System Admin. Resets the invitation expiry to 90 days from now and returns a
        fresh mailto: link. No new records are created; the existing user UUID and any assigned
        node authorizations are preserved. SR-007a.
      parameters:
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Expiry reset; fresh mailto link returned
          content:
            application/json:
              schema:
                type: object
                required: [mailtoLink, invitation]
                properties:
                  mailtoLink:
                    type: string
                    description: "Pre-filled mailto: URI for the admin to send"
                  invitation:
                    $ref: '#/components/schemas/PendingInvitation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # Nodes
  # Note: /nodes/root must be matched before /nodes/{nodeId} in the router.
  # ---------------------------------------------------------------------------

  /nodes/root:
    get:
      tags: [nodes]
      summary: Get root node
      operationId: getRootNode
      description: |
        Returns the root node with its visible direct children. No authorization check beyond
        authentication — the root node is always accessible; children are filtered by visibility.
        SR-016.
      responses:
        '200':
          description: Root node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /nodes/{nodeId}:
    get:
      tags: [nodes]
      summary: Get node
      operationId: getNode
      description: |
        Returns node with visible direct children. Requires at least view on node (direct or
        inherited). SR-016.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Node with children
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [nodes]
      summary: Update node
      operationId: updateNode
      description: |
        Requires effective admin on node or ancestor. All fields optional; omitted fields unchanged.
        Color must be a valid CSS hex color string (e.g. '#4A90D9'). Icon must be a valid
        PrimeIcons identifier. SR-018.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: [string, 'null']
                color:
                  type: [string, 'null']
                  description: CSS hex color e.g. '#4A90D9'; null to clear
                icon:
                  type: [string, 'null']
                  description: PrimeIcons identifier e.g. 'pi-briefcase'; null to clear
      responses:
        '200':
          description: Updated node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /nodes/{nodeId}/children:
    post:
      tags: [nodes]
      summary: Create child node
      operationId: createChildNode
      description: |
        Requires effective admin on the parent node or ancestor. New node is active, appended
        after existing siblings. SR-017.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Created child node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /nodes/{nodeId}/children/order:
    put:
      tags: [nodes]
      summary: Reorder children
      operationId: reorderChildren
      description: |
        Submit the complete ordered list of direct child IDs. Requires effective admin on node or
        ancestor. Rejects if the list does not match the current set of direct children. SR-019.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [childIds]
              properties:
                childIds:
                  type: array
                  description: Complete ordered list of direct child node IDs
                  items:
                    type: string
                    format: uuid
      responses:
        '204':
          description: Reordered
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /nodes/{nodeId}/logo:
    get:
      tags: [nodes]
      summary: Get node logo
      operationId: getNodeLogo
      description: |
        Returns the uploaded logo image. Requires at least view on node. Returns 404 if no logo
        is set. SR-018.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Logo image
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/svg+xml:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [nodes]
      summary: Upload node logo
      operationId: uploadNodeLogo
      description: |
        Requires effective admin on node or ancestor. Accepts image/png, image/jpeg, image/svg+xml,
        image/webp. Maximum 256 KB. Replaces any existing logo. SR-018.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [logo]
              properties:
                logo:
                  type: string
                  format: binary
      responses:
        '200':
          description: Updated node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags: [nodes]
      summary: Remove node logo
      operationId: deleteNodeLogo
      description: Requires effective admin on node or ancestor. Clears logo and logo_mime_type. SR-018.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated node (logo cleared)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /nodes/{nodeId}/deactivate:
    post:
      tags: [nodes]
      summary: Deactivate node
      operationId: deactivateNode
      description: |
        Requires effective admin on node or ancestor. Blocked if active children exist. An active
        time entry on the node itself does not block deactivation — the running entry may complete
        normally. Sets deactivated_at = NOW(). SR-020.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deactivated node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /nodes/{nodeId}/reactivate:
    post:
      tags: [nodes]
      summary: Reactivate node
      operationId: reactivateNode
      description: Requires effective admin on node or ancestor. Clears deactivated_at. SR-021.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Reactivated node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /nodes/{nodeId}/move:
    post:
      tags: [nodes]
      summary: Move node to different parent
      operationId: moveNode
      description: |
        Requires effective admin on the moved node AND on the destination parent. Destination must
        not be the node itself or any descendant. Sort order set to append at destination. SR-022.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [destinationParentId]
              properties:
                destinationParentId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Moved node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ---------------------------------------------------------------------------
  # Node authorizations
  # ---------------------------------------------------------------------------

  /nodes/{nodeId}/authorizations:
    get:
      tags: [authorizations]
      summary: List node authorization assignments
      operationId: listNodeAuthorizations
      description: |
        Requires effective admin on node or ancestor. Returns both direct assignments and those
        inherited from ancestor nodes, distinguished by the inherited flag. SR-025.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Authorization assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NodeAuthorization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /nodes/{nodeId}/authorizations/{userId}:
    put:
      tags: [authorizations]
      summary: Grant or update authorization
      operationId: grantAuthorization
      description: |
        Upserts a node_authorizations row. Requires the requesting user to have effective admin on
        this node. SR-023.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [authorization]
              properties:
                authorization:
                  $ref: '#/components/schemas/AuthLevel'
      responses:
        '204':
          description: Authorization granted or updated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [authorizations]
      summary: Revoke authorization
      operationId: revokeAuthorization
      description: |
        Deletes a node_authorizations row. Requires effective admin on node or ancestor. Blocked
        if the row is the last admin-level authorization on this node. SR-024.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ---------------------------------------------------------------------------
  # Requests (in-app request board)
  # ---------------------------------------------------------------------------

  /nodes/{nodeId}/requests:
    get:
      tags: [requests]
      summary: List requests on a node
      operationId: listNodeRequests
      description: |
        Requires at least view on node. Returns all requests (open and closed). SR-041.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RequestRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [requests]
      summary: Submit a request
      operationId: createRequest
      description: Requires at least view on node. SR-040.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [template]
              properties:
                template:
                  type: string
                  enum: [grant_authorization, create_child_node, free_text]
                body:
                  type: [string, 'null']
      responses:
        '201':
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /nodes/{nodeId}/requests/{requestId}/close:
    post:
      tags: [requests]
      summary: Close a request
      operationId: closeRequest
      description: Requires effective admin on node or ancestor. Blocked if already closed. SR-042.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Closed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ---------------------------------------------------------------------------
  # Tracking
  # ---------------------------------------------------------------------------

  /tracking:
    get:
      tags: [tracking]
      summary: Get current tracking status
      operationId: getTrackingStatus
      description: Returns active time entry with elapsed seconds, or empty state. SR-026.
      responses:
        '200':
          description: Tracking status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackingStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tracking/history:
    get:
      tags: [tracking]
      summary: Recent time entry history
      operationId: getTrackingHistory
      description: |
        Returns recent time entries for the authenticated user, descending startedAt, with overlap
        and gap flags. SR-027.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Paginated time entries
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimeEntry'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tracking/start:
    post:
      tags: [tracking]
      summary: Start or switch tracking
      operationId: startTracking
      description: |
        Starts tracking on the target node. If already tracking, atomically stops current entry
        and starts new one (switch). Node must be active, have no active children, and user must
        have at least track authorization. Client must supply IANA timezone. SR-028/SR-029.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nodeId, timezone]
              properties:
                nodeId:
                  type: string
                  format: uuid
                timezone:
                  type: string
                  description: IANA timezone from browser
                  example: Europe/Berlin
      responses:
        '200':
          description: New tracking status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackingStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /tracking/stop:
    post:
      tags: [tracking]
      summary: Stop tracking
      operationId: stopTracking
      description: Stops the active session. Returns empty tracking state. SR-030.
      responses:
        '200':
          description: Empty tracking status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackingStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  # ---------------------------------------------------------------------------
  # Time entries (manual / retroactive management)
  # ---------------------------------------------------------------------------

  /time-entries:
    post:
      tags: [time-entries]
      summary: Create retroactive time entry
      operationId: createTimeEntry
      description: |
        Node must be active, have no active children, and user must have at least track
        authorization. startedAt must be before endedAt. SR-032.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nodeId, startedAt, endedAt, timezone]
              properties:
                nodeId:
                  type: string
                  format: uuid
                startedAt:
                  type: string
                  format: date-time
                endedAt:
                  type: string
                  format: date-time
                timezone:
                  type: string
                description:
                  type: [string, 'null']
                  description: Optional short note
      responses:
        '201':
          description: Created time entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /time-entries/{entryId}:
    put:
      tags: [time-entries]
      summary: Edit time entry
      operationId: updateTimeEntry
      description: |
        All fields optional; omitted fields unchanged. Blocked if startedAt is before the effective freeze cutoff.
        If nodeId changes, the new node must satisfy the same constraints as tracking start.
        SR-033.
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodeId:
                  type: string
                  format: uuid
                startedAt:
                  type: string
                  format: date-time
                endedAt:
                  type: string
                  format: date-time
                description:
                  type: [string, 'null']
                  description: Optional short note; null to clear
      responses:
        '200':
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags: [time-entries]
      summary: Delete time entry
      operationId: deleteTimeEntry
      description: Blocked if startedAt is before the effective freeze cutoff. SR-034.
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /time-entries/{entryId}/duplicate:
    post:
      tags: [time-entries]
      summary: Duplicate time entry
      operationId: duplicateTimeEntry
      description: |
        Creates a new entry from an existing one with a new time range. Description is copied
        from the original. SR-035.
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [startedAt, endedAt]
              properties:
                startedAt:
                  type: string
                  format: date-time
                endedAt:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Duplicated entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ---------------------------------------------------------------------------
  # Quick access
  # ---------------------------------------------------------------------------

  /quick-access:
    get:
      tags: [quick-access]
      summary: Get quick-access list
      operationId: getQuickAccess
      description: |
        Returns personal quick-access list. Non-trackable entries (deactivated or has active
        children) are annotated with nonTrackable = true and not auto-removed. Node color, icon,
        and logoUrl are included from the node record. SR-031.
      responses:
        '200':
          description: Quick-access entries in sort order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuickAccessEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [quick-access]
      summary: Add node to quick-access list
      operationId: addQuickAccess
      description: Blocked if list already has 9 entries. SR-031.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nodeId]
              properties:
                nodeId:
                  type: string
                  format: uuid
      responses:
        '204':
          description: Added
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /quick-access/{nodeId}:
    delete:
      tags: [quick-access]
      summary: Remove node from quick-access list
      operationId: removeQuickAccess
      description: SR-031.
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /quick-access/order:
    put:
      tags: [quick-access]
      summary: Reorder quick-access list
      operationId: reorderQuickAccess
      description: Submit the complete ordered list of node IDs. SR-031.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nodeIds]
              properties:
                nodeIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '204':
          description: Reordered
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ---------------------------------------------------------------------------
  # Reports
  # ---------------------------------------------------------------------------

  /reports:
    get:
      tags: [reports]
      summary: Get time report
      operationId: getReport
      description: |
        Filtered to nodes visible to requesting user. When nodeId is supplied, includes all
        entries for the node and its visible subtree. All timestamps in company timezone. SR-037/
        SR-038.
      parameters:
        - name: mode
          in: query
          required: true
          schema:
            type: string
            enum: [summary, detailed]
        - name: from
          in: query
          schema:
            type: string
            format: date
            description: Inclusive start date in company timezone
        - name: to
          in: query
          schema:
            type: string
            format: date
            description: Inclusive end date in company timezone
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: nodeId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /reports/export:
    get:
      tags: [reports]
      summary: Export report as CSV
      operationId: exportReport
      description: Same filters as GET /reports. SR-039.
      parameters:
        - name: mode
          in: query
          required: true
          schema:
            type: string
            enum: [summary, detailed]
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: nodeId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: CSV download
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'

  /reports/members:
    get:
      tags: [reports]
      summary: Get member time summaries
      operationId: getMemberSummaries
      description: |
        Returns per-member aggregated totals on nodes visible to the requesting user. Individual
        time entry details are never exposed — only the total per bucket. Each bucket carries a
        hasDataQualityIssues flag (true if the member's entries for that bucket contain overlaps
        or gaps). Filterable by that flag. SR-063.
      parameters:
        - name: interval
          in: query
          required: true
          schema:
            type: string
            enum: [day, week, month, year, year_to_date, month_to_date]
        - name: from
          in: query
          schema:
            type: string
            format: date
            description: Inclusive start date in company timezone (required for day/week/month/year)
        - name: to
          in: query
          schema:
            type: string
            format: date
            description: Inclusive end date in company timezone (required for day/week/month/year)
        - name: nodeId
          in: query
          schema:
            type: string
            format: uuid
            description: Restrict to the node's visible subtree; omit for all visible nodes
        - name: hasDataQualityIssues
          in: query
          schema:
            type: boolean
            description: Filter to members that have at least one bucket with quality issues; omit for all
      responses:
        '200':
          description: Member summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MemberSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ---------------------------------------------------------------------------
  # Account
  # ---------------------------------------------------------------------------

  /account:
    get:
      tags: [account]
      summary: Get own profile
      operationId: getProfile
      description: Returns stored name and linked OAuth2 providers. SR-043.
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                type: object
                required: [userId, name, providers]
                properties:
                  userId:
                    type: string
                    format: uuid
                  name:
                    type: string
                  providers:
                    type: array
                    items:
                      type: string
                      enum: [google, apple, microsoft, keycloak]
                  lastReportSettings:
                    type: [object, 'null']
                    additionalProperties: true
                    description: Last saved report filter state; null if not yet set. SR-043b.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /account/report-settings:
    put:
      tags: [account]
      summary: Save last report filter state
      operationId: saveReportSettings
      description: |
        Persists the user's last report filter state for multi-device consistency. The body is
        stored as-is in last_report_settings (JSONB). SR-043b.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Arbitrary report filter state; opaque to the server
              additionalProperties: true
      responses:
        '204':
          description: Saved
        '401':
          $ref: '#/components/responses/Unauthorized'

  /account/authorizations:
    get:
      tags: [account]
      summary: Get own node authorization assignments
      operationId: getOwnAuthorizations
      description: Returns all node_authorizations rows for the authenticated user with full node paths. SR-046.
      responses:
        '200':
          description: Authorization assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserAuthorization'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /account/providers:
    post:
      tags: [account]
      summary: Link additional OAuth2 provider
      operationId: linkProvider
      description: |
        Initiates OAuth2 linking flow for an additional provider. In practice, the client
        redirects to /oauth2/authorization/{provider} with a linking flag. This endpoint
        records the completed link after the OAuth2 callback. SR-044.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider]
              properties:
                provider:
                  type: string
                  enum: [google, apple, microsoft, keycloak]
      responses:
        '204':
          description: Provider linked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /account/providers/{provider}:
    delete:
      tags: [account]
      summary: Unlink OAuth2 provider
      operationId: unlinkProvider
      description: Blocked if only one provider remains linked. SR-045.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, apple, microsoft, keycloak]
      responses:
        '204':
          description: Unlinked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /account/anonymize:
    post:
      tags: [account]
      summary: Anonymise own account
      operationId: anonymizeAccount
      description: |
        Irreversible. Stops active tracking, revokes all MCP tokens, removes all node
        authorizations, and deletes personal data. Time entries are retained anonymously. Session
        is invalidated. Re-registration requires a new invitation and creates a new identity.
        SR-047.
      responses:
        '204':
          description: Anonymised; session invalidated
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---------------------------------------------------------------------------
  # MCP access tokens
  # ---------------------------------------------------------------------------

  /account/mcp-tokens:
    get:
      tags: [mcp]
      summary: List own MCP tokens
      operationId: listOwnMcpTokens
      description: Returns all active (non-revoked) MCP tokens for the authenticated user. SR-065a.
      responses:
        '200':
          description: Active MCP tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/McpToken'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [mcp]
      summary: Generate MCP token
      operationId: generateMcpToken
      description: |
        Generates a new MCP access token. The raw token value is returned exactly once in this
        response and is never stored — only its SHA-256 hash is retained. SR-065.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:
                  type: string
                  description: Human-readable label for the token
                expiresAt:
                  type: [string, 'null']
                  format: date-time
                  description: Optional expiry; null or omitted means non-expiring
      responses:
        '201':
          description: Token created — raw value shown once
          content:
            application/json:
              schema:
                type: object
                required: [token, mcpToken]
                properties:
                  token:
                    type: string
                    description: Raw token value — shown once, never stored
                  mcpToken:
                    $ref: '#/components/schemas/McpToken'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /account/mcp-tokens/{tokenId}:
    delete:
      tags: [mcp]
      summary: Revoke own MCP token
      operationId: revokeMcpToken
      description: Soft-revokes the token. The token hash is retained for audit. SR-067.
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/mcp-tokens:
    get:
      tags: [mcp]
      summary: List all active MCP tokens (System Admin)
      operationId: listAllMcpTokens
      description: Requires System Admin. Returns all non-revoked tokens across all users. SR-068.
      responses:
        '200':
          description: All active MCP tokens with owner information
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/McpTokenWithOwner'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/mcp-tokens/{tokenId}:
    delete:
      tags: [mcp]
      summary: Revoke any MCP token (System Admin)
      operationId: adminRevokeMcpToken
      description: Requires System Admin. Soft-revokes any token; revocation is logged to the security event log. SR-069.
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # Security events — System Admin only
  # ---------------------------------------------------------------------------

  /security-events:
    get:
      tags: [security-events]
      summary: List security events
      operationId: listSecurityEvents
      description: Requires System Admin. SR-050.
      parameters:
        - name: eventType
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Security events
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/SecurityEvent'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ---------------------------------------------------------------------------
  # About
  # ---------------------------------------------------------------------------

  /about:
    get:
      tags: [about]
      summary: About page
      operationId: getAbout
      description: |
        Application version, third-party licenses, SBOM download link, OpenAPI spec download
        link, and built-in GDPR data summary. No authentication required. If the requesting user
        is authenticated and has at least one effective node authorization, the company Privacy
        Notice URL is also included (if configured). SR-048.
      security: []
      responses:
        '200':
          description: About information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AboutInfo'

  # ---------------------------------------------------------------------------
  # SSE
  # ---------------------------------------------------------------------------

  /events:
    get:
      tags: [events]
      summary: Server-Sent Events stream
      operationId: getEventStream
      description: |
        Persistent SSE connection for live state synchronisation. SR-062.

        **Event types and recipients:**

        `tracking` — Tracking state changed.
        Data: `TrackingStatus`.
        Recipients: all sessions of the same user.

        `node` — Node tree changed (create, update, reorder, deactivate, reactivate, move).
        Data: `{ nodeId, parentId, changeType: "created"|"updated"|"reordered"|"deactivated"|"reactivated"|"moved" }`.
        Recipients: all sessions of users with at least view on the affected node.

        `authorization` — Authorization assignment changed for the authenticated user.
        Data: `UserAuthorization | { nodeId, revoked: true }`.
        Recipients: all sessions of the affected user.

        `request` — Request created or closed.
        Data: `RequestRecord`.
        Recipients: all sessions of Node Admins of the relevant node and all ancestors.

        `quick-access` — A node in the user's quick-access list has been updated (color, icon,
        logo, name, or trackability changed).
        Data: `QuickAccessEntry`.
        Recipients: all sessions of users who have the affected node in their quick-access list.

        `mcp-token-revoked` — One of the user's MCP tokens was revoked (e.g. by System Admin).
        Data: `{ tokenId: string (uuid) }`.
        Recipients: all sessions of the token owner.
      responses:
        '200':
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
