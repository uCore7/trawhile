services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: trawhile
      POSTGRES_USER: tt
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tt -d trawhile"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata_dev:
